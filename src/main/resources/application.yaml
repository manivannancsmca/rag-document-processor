server:
  port: 8088
  tomcat:
    max-swallow-size: 100MB
    max-http-form-post-size: 100MB

spring:
  application:
    name: rag-document-processor
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB

# Enterprise Configs for Ollama and PGVector integration via LangChain4j
langchain4j:
  ollama:
    chat-model:
      base-url: http://localhost:11434
      model-name: llama3.1
      temperature: 0.2
      timeout: 120s # Give the reasoning model up to 2 minutes to respond
    embedding-model:
      base-url: http://localhost:11434
      model-name: nomic-embed-text
      timeout: 1800s # CRITICAL: Give your hardware up to 10 minutes for heavy bulk embedding generation

infrastructure:
  datasource:
    url: jdbc:postgresql://localhost:5432/rag_db
    host: localhost
    port: 5432
    database: rag_db
    user: senior_arch
    password: enterprise_password
    table-name: document_embeddings
    dimension: 768

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    
